
services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - ${COMPOSE_APP_HTTP_PORT:-8000}:80
      - ${COMPOSE_APP_HTTPS_PORT:-8001}:443
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: database
      MYSQL_USER: docker
      MYSQL_PASSWORD: docker
      MYSQL_ROOT_PASSWORD: docker
      TZ: Asia/Tokyo
    command: mysqld --character-set-server=utf8mb4
    ports:
      - ${COMPOSE_DB_PORT:-3306}:3306
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/log:/var/log/mysql

  redis:
    image: redis:latest
    ports:
      - ${COMPOSE_REDIS_PORT:-6379}:6379

  snippet-api:
    build:
      context: ./snippet-api
      dockerfile: Dockerfile
    environment:
      SNIPPET_API_TOKEN: ${SNIPPET_API_TOKEN:-local-snippet-token}
      SNIPPET_PATH: ${SNIPPET_PATH:-/data/snippets}
    ports:
      - ${COMPOSE_SNIPPET_API_PORT:-18080}:8080
    volumes:
      - ./snippet-api/data/snippets:${SNIPPET_PATH:-/data/snippets}

  s3-proxy:
    build:
      context: ./s3-proxy
      dockerfile: Dockerfile
    environment:
      S3_BACKEND_ENDPOINT: ${S3_BACKEND_ENDPOINT:-http://minio:9000}
      S3_BACKEND_REGION: ${S3_BACKEND_REGION:-us-east-1}
      S3_BACKEND_ACCESS_KEY: ${S3_BACKEND_ACCESS_KEY:-minioadmin}
      S3_BACKEND_SECRET_KEY: ${S3_BACKEND_SECRET_KEY:-minioadmin}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: docker
      DB_PASSWORD: docker
      DB_NAME: database
      LISTEN_ADDR: 0.0.0.0
      LISTEN_PORT: 9000
      CACHE_REFRESH_INTERVAL: 10s
      LOG_LEVEL: info
    ports:
      - ${COMPOSE_S3_PROXY_PORT:-9000}:9000
    depends_on:
      - db
      - minio

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - ${COMPOSE_MINIO_API_PORT:-9100}:9000
      - ${COMPOSE_MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - ./docker/minio/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
